<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - StudyPlanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/prem.css" />
</head>
<body>
  <header class="navbar">
    <div class="container">
      <h1 class="logo"><img src="image/logo22.png" alt="StudyPlanner logo" class="logo-img"> StudyPlanner</h1>
      <nav>
        <a href="index.html" class="home">Home</a>
        <a href="login.html" class="btn">Login</a>
      </nav>
    </div>
  </header>

  <section class="form-section">
    <div class="form-container">
      <h2>Create Account</h2>
      <p>Join StudyPlanner Today</p>
      <form id="registerForm">
        <input type="text" name="fname" placeholder="Full Name" required>
        <input type="date" name="dob" placeholder="Date of Birth" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type="password" name="cpassword" placeholder="Confirm Password" required>
        <input type="file" name="profile_img" accept="image/*" required>
        <button type="submit" class="btn primary">Register</button>
      </form>
      <p class="switch">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </section>

  <footer>
    <p>© 2025 StudyPlanner. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
